summary: Test memcached responds to memcached-tool via sidecar

execute: |
  # Cleanup on exit
  trap "docker stop memcached-rock >/dev/null 2>&1 || true" EXIT

  # Run the container in a non default port
  docker run --rm -d --name memcached-rock -p 22122:22122 memcached:1.6-26.04 \
    --args memcached --port=22122 --udp-port=11211

  # Wait for memcached to be available on the new port
  until printf "stats\r\n" | nc -q 1 -w 1 127.0.0.1 22122 | grep "STAT uptime"; do
    echo "Waiting for memcached to be available on port 22122..."
  done

  printf "set my_key 0 60 11\r\nhello world\r\n" | nc -q 1 127.0.0.1 22122
  printf "get my_key\r\n" | nc -q 1 127.0.0.1 22122 | grep "hello world"
