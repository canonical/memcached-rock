summary: Test memcaches listens on port 11211

execute: |
  # Cleanup on exit
  trap "docker stop memcached-rock >/dev/null 2>&1 || true" EXIT

  #run the container and bind the port
  docker run --rm -d --name memcached-rock -p 11211:11211 memcached:1.6-26.04 

  printf "set my_key 0 60 11\r\nhello world\r\n" | nc -q 1 127.0.0.1 11211
  printf "get my_key\r\n" | nc -q 1 127.0.0.1 11211 | grep "hello world"
