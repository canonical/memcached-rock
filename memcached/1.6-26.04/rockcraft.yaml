name: memcached
# see https://documentation.ubuntu.com/rockcraft/en/1.14.0/explanation/bases/
# for more information about bases and using 'bare' bases for chiselled rocks
base: bare # the base environment for this rock
build-base: devel
version: '1.6' # just for humans. Semantic versioning is recommended
summary: High-performance, distributed memory object caching system
description: |
    Memcached is a distributed memory cache designed to speed up web
    applications by caching database and API results. It is intended for use
    in accelerating dynamic web applications by reducing database load.
    By storing frequently accessed data in RAM, it minimizes latency and
    enables infrastructure to scale efficiently during peak traffic.

platforms: # the platforms this rock should be built on and run on
    amd64:

services:
  memcached:
    override: replace
    summary: "memcached service"
    command: memcached -u _daemon_
    startup: enabled
    environment:
      TZ: UTC

run-user: _daemon_

parts:
    memcached:
        plugin: nil
        stage-packages:
            - base-files_base 
            - base-files_chisel #creates manifest for chisel with all slices
            - base-files_release-info #ect os releases info
            - libsasl2-modules_libs
            - memcached_bins
            - tzdata_zoneinfo

    deb-security-manifest:
        plugin: make
        source: https://github.com/canonical/rocks-security-manifest
        source-type: git
        source-branch: main
        override-prime: gen_manifest